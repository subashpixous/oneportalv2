name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🐳 Docker Login
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 🐳 Build & Push API
      - name: Build API Image
        run: |
          docker build -t subashpixous/oneportalv2-api:latest ./API
          docker push subashpixous/oneportalv2-api:latest

      # 🐳 Build & Push UI
      - name: Build UI Image
        run: |
          docker build -t subashpixous/oneportalv2-ui:latest ./UI
          docker push subashpixous/oneportalv2-ui:latest

      # 🚀 Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app

            echo "📦 Pull latest images..."
            docker pull subashpixous/oneportalv2-api:latest
            docker pull subashpixous/oneportalv2-ui:latest

            echo "🛑 Stop old containers..."
            docker-compose down || true

            echo "🚀 Start new containers..."
            docker-compose up -d --build

            echo "✅ Deployment completed!"
            docker ps