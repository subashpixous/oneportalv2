name: Deploy to EC2

on:
push:
branches:
- main

env:
DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
API_IMAGE: oneportalv2-api
UI_IMAGE: oneportalv2-ui

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Docker Login
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_HUB_USERNAME }}
    password: ${{ secrets.DOCKER_HUB_TOKEN }}

- name: Build API
  run: |
    docker build -t $DOCKER_HUB_USERNAME/$API_IMAGE:latest ./API
    docker push $DOCKER_HUB_USERNAME/$API_IMAGE:latest

- name: Build UI
  run: |
    docker build -t $DOCKER_HUB_USERNAME/$UI_IMAGE:latest ./UI
    docker push $DOCKER_HUB_USERNAME/$UI_IMAGE:latest

- name: Deploy EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ubuntu
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      cd /home/ubuntu/app
      docker pull $DOCKER_HUB_USERNAME/$API_IMAGE:latest
      docker pull $DOCKER_HUB_USERNAME/$UI_IMAGE:latest
      docker-compose down
      docker-compose up -d
```
