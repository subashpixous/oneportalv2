name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build API
        run: |
          docker build -t subashpixous/oneportalv2-api:latest ./API
          docker push subashpixous/oneportalv2-api:latest

      - name: Build UI
        run: |
          docker build -t subashpixous/oneportalv2-ui:latest ./UI
          docker push subashpixous/oneportalv2-ui:latest

      - name: Deploy EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker pull subashpixous/oneportalv2-api:latest
            docker pull subashpixous/oneportalv2-ui:latest
            docker-compose down
            docker-compose up -d