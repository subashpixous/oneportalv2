<p-toast></p-toast>
<div style="  ">
    <div class="flex justify-content-between" style="background-color: #E5FFFE;padding: 8px;">
        <div class="flex align-items-center  mr-4">
            <p class="">TNCWWB Forgot Password</p>
        </div>
        <div class="flex align-items-center  mr-4">
            <app-breadcrumb [breadcrumbs]="breadcrumbs"></app-breadcrumb>
        </div>
    </div>
    <div class="container container-md cntdtyle">
        <div class="text-align-center" style="text-align:center">
            <span class="p-error " *ngIf=" isError">{{ErrorMessage}}</span>
        </div>
        <label for="email1" style="font-size: 12px;">Mobile Number</label>
        <input id="mobileNumber" type="text" minlength=10 maxlength=10 (keypress)="keyPress($event)"
            (change)="clearErrormessage($event)" [(ngModel)]="mobileNumber" placeholder="Mobile Number" pInputText
            class=" mb-3" [style]="{'padding':'5px','width':'100%'}" [disabled]="disableMobileField">


        <label for="otp" class="font-size: 12px;" *ngIf="showOTPField">OTP</label>
        <input id="otp" type="text" minlength=6 maxlength=6 (keypress)="keyPress($event)"
            (change)="clearErrormessage($event)" [(ngModel)]="otp" placeholder="OTP" *ngIf="showOTPField" pInputText
            class=" mb-3" [style]="{'padding':'5px','width':'100%'}">

        <label for="password" class="font-size: 12px;" *ngIf="showPassword">Password</label>
        <input id="password" type="text" (change)="clearErrormessage($event)" [(ngModel)]="password"
            placeholder="Password" *ngIf="showPassword" pInputText class=" mb-3"
            [style]="{'padding':'5px','width':'100%'}">

        <label for="confirmPassword" class="font-size: 12px;" *ngIf="showPassword">Confirm Password</label>
        <input id="confirmPassword" type="text" (change)="clearErrormessage($event)" [(ngModel)]="confirmPassword"
            placeholder="Confirm Password" *ngIf="showPassword" pInputText class=" mb-3"
            [style]="{'padding':'5px','width':'100%'}">

        <div class="flex align-items-center justify-content-between mb-5 gap-5 flex-wrap">
            <div class="flex align-items-center">
                <p *ngIf="showCounter" style="font-size: 12px;"> Resend OTP in {{ counter }} seconds</p>
                <a *ngIf="showResendOtp" class="font-medium no-underline ml-2 text-right cursor-pointer"
                    style="color: var(--primary-color)" (click)="resendOTP()">Resend OTP</a>
            </div>
        </div>
        <div class="mt-3 flex justify-content-center flex-wrap ">
            <p-button severity="secondary" styleClass="bcbtn" (onClick)="bckClick()" label="Back" />
            <p-button severity="primary" styleClass="bcbtn" (onClick)="onSubmit()" [disabled]="disableButton"
                label="{{buttonLabel}}" />
        </div>
    </div>
</div>
