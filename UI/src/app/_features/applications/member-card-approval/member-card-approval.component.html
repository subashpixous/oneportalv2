<div class="card noborderRad">
  <div class="grid formgrid">
    <div class="col-12 lg:col-4 md:col-4 mb-2">
      <h4>{{ title }}</h4>
    </div>
    <div class="col-12 lg:col-4 md:col-4 mb-2"></div>
    <div class="col-12 row lg:col-12 md:col-12 flex">
      <div class="col-12 lg:col-2 md:col-2">
        <p-dropdown
          [options]="datefilter"
          optionLabel="text"
          [style]="{ width: '100%' }"
          optionValue="value"
          placeholder="Select a Date Range"
          [showClear]="false"
          [(ngModel)]="selecteddatefilter"
        ></p-dropdown>
      </div>
      <div class="col-12 lg:col-2 md:col-2">
        <p-multiSelect
          [options]="districts"
          optionLabel="text"
          [style]="{ width: '100%' }"
          optionValue="value"
          placeholder="Select a District"
          [showClear]="false"
          [(ngModel)]="selectedDistricts"
        ></p-multiSelect>
      </div>
      <div class="col-12 lg:col-2 md:col-2 ">
<p-dropdown
  [options]="cardDisbursedStatusOptions"
  [(ngModel)]="selectedCardDisbursedStatus"
  optionLabel="label"
  optionValue="value"
  placeholder="Card Disbursed Status">
</p-dropdown>
</div>
      <div class="col-12 lg:col-2 md:col-2 d-none">
        <p-dropdown
          [options]="statuses"
          optionLabel="text"
          optionValue="value"
          placeholder="Select a Status"
          [showClear]="false"
          [(ngModel)]="selectedStatus"
          (onChange)="onStatusChanged($event)"
          [style]="{ width: '100%' }"
        >
        </p-dropdown>
      </div>
      <div class="col-12 lg:col-2 md:col-2 flex align-items-center gap-2">
        <button
          pButton
          pRipple
          class="p-button-secondary"
          icon="pi pi-arrow-right"
          (click)="generate()"
        ></button>
        <p-button
          icon="pi pi-times "
          [outlined]="true"
          (click)="reset()"
          [style]="{ 'margin-left': '10px' }"
        ></p-button>
      </div>
    </div>
  </div>
  <div class="mb-3 mt-3">
    <div class="row">
            <app-datatable-pagination
        #dt
        [records]="configurationList"
        [defaultSortField]="defaultSortField"
        [defaultSortOrder]="defaultSortOrder"
        [cols]="cols"
        [fileName]="'Requested For Print'"
        [rows]="rows"
        [total]="total"
        [actions]="actions"
        (invokeAction)="actioInvoked($event)"
        [selectedRows]= "selectedRows"
        [defaultstatus]="!currentStatus"
        (changeStatus)="changeStatus($event)"
        [searchableColumns]="searchableColumns"
        [hasActiveInactive]="false"
        [canShowAction]="false"
        (changefilter)="changefilter($event)"
        (actionalAction)="actionalAction($event)"
        [canShowCheckbox]="true"
        (selectedApplications)="onSelectedApplications($event)"
          [excelExport]="true" 
      (exportRequest)="onExportRequest($event)"
      >
       <!-- modified by Sivasankar on 06-11-2025 for export functionality -->
      </app-datatable-pagination>
    </div>
  </div>
  <div class="mb-3 mt-3">
    <div class="card">
      <h5>Approval Form</h5>
      <form [formGroup]="approvalForm" (ngSubmit)="submit()" class="col-12">
        <div class="p-fluid">
          <div class="flex grid formgrid">
            <div class="field col-12 md:col-12 lg:col-12">
              <label htmlFor="applicationIdsText">Applications</label>
              <p-chips
                formControlName="applicationIdsText"
                [disabled]="true"
              ></p-chips>
              <app-error-msg
                [control]="approvalForm.get('applicationIds')"
              ></app-error-msg>
            </div>
            <div class="field col-12 md:col-6 lg:col-6">
              <label htmlFor="status">Status</label>
              <input
                pInputText
                formControlName="status"
                [readOnly]="true"
                type="text"
              />
              <app-error-msg
                [control]="approvalForm.get('status')"
              ></app-error-msg>
            </div>
            <div class="field col-12 md:col-6 lg:col-6">
              <label htmlFor="date">Date</label>
              <input
                pInputText
                formControlName="date"
                [readOnly]="true"
                type="text"
              />
              <app-error-msg
                [control]="approvalForm.get('date')"
              ></app-error-msg>
            </div>
            <div class="field col-12 md:col-6 lg:col-6">
              <label htmlFor="name">Name</label>
              <input
                pInputText
                formControlName="name"
                [readOnly]="true"
                type="text"
              />
              <app-error-msg
                [control]="approvalForm.get('name')"
              ></app-error-msg>
            </div>
            <div class="field col-12 md:col-6 lg:col-6">
              <label htmlFor="jobTitle">Role</label>
              <input
                pInputText
                formControlName="jobTitle"
                [readOnly]="true"
                type="text"
              />
              <app-error-msg
                [control]="approvalForm.get('jobTitle')"
              ></app-error-msg>
            </div>
            <div class="field col-12 md:col-6 lg:col-6">
              <label htmlFor="dob">Approve/ Return Status</label>
              <p-dropdown
                [options]="approvalStatuses"
                optionLabel="statusName"
                optionValue="statusId"
                placeholder="Select a status"
                formControlName="approvalRejectedstatus"
                [showClear]="true"
              ></p-dropdown>
              <app-error-msg
                [control]="approvalForm.get('approvalRejectedstatus')"
              ></app-error-msg>
            </div>
            <div class="field col-12 md:col-6 lg:col-6" *ngIf="canshowreason">
              <label htmlFor="reason">Reason</label>
              <p-dropdown
                [options]="reasons"
                optionLabel="text"
                optionValue="value"
                placeholder="Select a reason"
                formControlName="reason"
                [showClear]="true"
              ></p-dropdown>
              <app-error-msg
                [control]="approvalForm.get('reason')"
              ></app-error-msg>
            </div>
           <div class="field col-12 md:col-6 lg:col-6">
              <label htmlFor="comments">Comments</label>
              <input pInputText formControlName="comments" type="text" />
         
                <div class="p-error" *ngIf="
    approvalForm.get('comments')?.touched &&
    approvalForm.get('comments')?.hasError('required')
  ">
     required
  </div>
            </div> 
          </div>
        </div>

        <div class="flex gap-3 mt-1" style="justify-content: end">
          <p-button label="Submit" type="submit" />
          <p-button label="Cancel" class="p-button-secondary" (onClick)="onCancel()" />
        </div>
      </form>
    </div>
  </div>
  
</div>
<p-toast></p-toast>
 <!-- modified by Sivasankar on 06-11-2025 for export functionality -->
