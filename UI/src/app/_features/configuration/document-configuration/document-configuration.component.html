<div class="card">
    <div class="grid formgrid" style="justify-content: space-between;padding: 0rem 1rem;margin-bottom: 10px;">
        <div class="">
            <h4>{{title}}
            </h4>
        </div>
    </div>
    <div class="grid formgrid mb-3">
        <form [formGroup]="roleForm" (ngSubmit)="submit()" class="col-12">
            <div class="card p-fluid" style="padding-bottom: 10px;">
                <div class="p-formgrid grid">
                    <div class="field col-12  md:col-12  lg:col-12">
                        <label htmlFor="scheme">Scheme</label>
                        <p-dropdown [options]="schemes" optionLabel="text" optionValue="value"
                            placeholder="Select a scheme" formControlName="scheme" [showClear]="
                            true"></p-dropdown>
                        <app-error-msg [control]="roleForm.get('scheme')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="group">Document Group</label>
                        <p-dropdown [options]="groups" optionLabel="text" optionValue="value"
                            placeholder="Select a group" formControlName="group" [showClear]="
                            true"></p-dropdown>
                        <app-error-msg [control]="roleForm.get('group')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="documentCategory">Document Category</label>
                        <p-dropdown [options]="documentCategories" optionLabel="text" optionValue="value"
                            placeholder="Select a catgory" formControlName="documentCategory" [showClear]="
                            true"></p-dropdown>
                        <app-error-msg [control]="roleForm.get('documentCategory')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="isRequired">Is Required</label>
                        <p-inputSwitch formControlName="isRequired" [style]="{'display':'flex'}" />
                        <app-error-msg [control]="roleForm.get('isRequired')"></app-error-msg>
                    </div>
                    <div class="col-12 md:col-3 flex  lg:col-3" style="margin-top: 25px">
                        <div class="col">
                            <button pButton type="submit"
                                *ngxPermissionsOnly="[privleges.CONFIG_UPDATE, privleges.CONFIG_CREATE]"
                                [disabled]="!roleForm.valid" label="Submit"></button>
                        </div>
                        <div class="col">
                            <button pButton type="button" class="p-button-secondary" label="Reset"
                                (click)="resetForm()"></button>
                        </div>

                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="grid formgrid">
        <div class="col-12 lg:col-9 md:col-9 flex ">
            <h4>{{this.title}} List </h4><span style="font-size: small;font-weight: 600;margin-left: 5px;"
                [ngStyle]="{'color': currentStatus ? '#0abb0a' : '#fd7878'}">
                {{currentStatus?'(Active)':'(In-Active)'}}</span>
        </div>
    </div>
    <app-datatable [records]="configurationList" [defaultSortField]="defaultSortField"
        [defaultSortOrder]="defaultSortOrder" [cols]="cols" [fileName]="'document'" [rows]="rows"
        [total]="configurationList ? configurationList.length : 0" [actions]="actions"
        (invokeAction)="actioInvoked($event)" [searchableColumns]="searchableColumns" [defaultstatus]="!currentStatus"
        (changeStatus)="changeStatus($event)" [hasActiveInactive]="true">
    </app-datatable>
</div>
