<div class=" formgrid mb-3">
    <form [formGroup]="fieldForm" (ngSubmit)="submit()" class="col-12">
        <div class="card p-fluid" style="padding-bottom: 10px;">
            <div class="p-formgrid grid">
                <div class="field col-12  md:col-6  lg:col-3">
                    <label htmlFor="fieldName">Field Name</label>
                    <p-dropdown [options]="feilds" optionLabel="text" optionValue="value" placeholder="Select a feild"
                        formControlName="fieldName" [showClear]="
                            true">
                    </p-dropdown>
                    <app-error-msg [control]="fieldForm.get('fieldName')"></app-error-msg>
                </div>
                <div class="field col-12  md:col-6  lg:col-3">
                    <label htmlFor="isRequired">Is Required</label>
                    <p-inputSwitch formControlName="isRequired" [style]="{'display':'flex'}" />
                    <app-error-msg [control]="fieldForm.get('isRequired')"></app-error-msg>
                </div>
                <div class="field col-12  md:col-6  lg:col-3">
                    <label htmlFor="isVisible">Is Visible</label>
                    <p-inputSwitch formControlName="isVisible" [style]="{'display':'flex'}" />
                    <app-error-msg [control]="fieldForm.get('isVisible')"></app-error-msg>
                </div>
                <div class="field col-12  md:col-12  lg:col-12">
                    <label htmlFor="tooltip">Tooltip</label>
                    <p-editor #editor formControlName="tooltip" [style]="{ height: '100px' }"></p-editor>
                    <app-error-msg [control]="fieldForm.get('tooltip')"></app-error-msg>
                </div>
                <div class="field col-12 md:col-12 flex  lg:col-12" style="justify-content: right;">
                    <div class="col-12 md:col-2">
                        <button pButton type="submit"
                            *ngxPermissionsOnly="[privleges.CONFIG_UPDATE, privleges.CONFIG_CREATE]"
                            [disabled]="!fieldForm.valid" label="Submit"></button>
                    </div>
                    <div class="col-12 md:col-2">
                        <button pButton type="button" class="p-button-secondary" label="Reset"
                            (click)="resetForm()"></button>
                    </div>

                </div>
            </div>
        </div>
    </form>
</div>

<div class="grid formgrid">
    <div class="col-12 lg:col-9 md:col-9 flex ">
        <h4>{{this.title}} List </h4><span style="font-size: small;font-weight: 600;margin-left: 5px;"
            [ngStyle]="{'color': currentStatus ? '#0abb0a' : '#fd7878'}">
            {{currentStatus?'(Active)':'(In-Active)'}}</span>
    </div>
</div>
<app-datatable [records]="configurationList" [defaultSortField]="defaultSortField" [defaultSortOrder]="defaultSortOrder"
    [cols]="cols" [fileName]="'Role'" [rows]="rows" [total]="configurationList ? configurationList.length : 0"
    [actions]="actions" (invokeAction)="actioInvoked($event)" [searchableColumns]="searchableColumns"
    [defaultstatus]="!currentStatus" (changeStatus)="changeStatus($event)" [hasActiveInactive]="false">
</app-datatable>
