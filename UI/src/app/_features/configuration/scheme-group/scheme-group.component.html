<div class="card">
    <div class="grid formgrid" style="justify-content: space-between;padding: 0rem 1rem;margin-bottom: 10px;">
        <div class="">
            <h4>{{title}}
            </h4>
        </div>
        <div class="">
        </div>
    </div>
    <div class="grid formgrid mb-3">
        <form [formGroup]="groupForm" (ngSubmit)="submit()" class="col-12">
            <div class="card p-fluid" style="padding-bottom: 10px;">
                <div class="p-formgrid grid">
                    <div class="field col-12  md:col-6  lg:col-3">
                        <label htmlFor="groupName">Group Name</label>
                        <input pInputText formControlName="groupName" type="text" />
                        <app-error-msg [control]="groupForm.get('groupName')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-6  lg:col-3">
                        <label htmlFor="groupNameTamil">Group Name (In Tamil)</label>
                        <input pInputText formControlName="groupNameTamil" type="text" />
                        <app-error-msg [control]="groupForm.get('groupNameTamil')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-12  lg:col-12">
                        <label htmlFor="description">Description</label>
                        <textarea rows="5" cols="30" pInputTextarea formControlName="description"
                            [style]="{'display':'flex'}"></textarea>
                        <app-error-msg [control]="groupForm.get('description')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-6  lg:col-3">
                        <label htmlFor="schemeIds">Schemes</label>
                        <p-multiSelect [options]="schemeList" optionLabel="text" optionValue="value" display="chip"
                            placeholder="Select a Schemes" formControlName="schemeIds" [showClear]="
                    false"></p-multiSelect>
                        <app-error-msg [control]="groupForm.get('schemeIds')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-6  lg:col-3">
                        <label htmlFor="groupImage">Group Icon</label>
                        <p-dropdown [options]="icons" display="chip" placeholder="Select a Call Letter"
                            formControlName="groupImage" [showClear]="false"></p-dropdown>
                        <app-error-msg [control]="groupForm.get('groupImage')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-2  lg:col-2 circlew" *ngIf="groupForm.get('groupImage')?.value">
                        <img [src]="'../../../assets/group-images/'+groupForm.get('groupImage')?.value"
                            class="img-responsive imgssize">
                    </div>
                    <div class="col-12 md:col-6 flex  lg:col-2" style="margin-top: 25px">
                        <div class="col">
                            <button pButton type="submit"
                                *ngxPermissionsOnly="[privleges.ROLE_CREATE, privleges.ROLE_UPDATE]"
                                [disabled]="!groupForm.valid" label="Submit"></button>
                        </div>
                        <div class="col">
                            <button pButton type="button" class="p-button-secondary" label="Reset"
                                (click)="resetForm()"></button>
                        </div>

                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="grid formgrid">
        <div class="col-12 lg:col-9 md:col-9 flex ">
            <h4>{{this.title}} List </h4><span style="font-size: small;font-weight: 600;margin-left: 5px;"
                [ngStyle]="{'color': currentStatus ? '#0abb0a' : '#fd7878'}">
                {{currentStatus?'(Active)':'(In-Active)'}}</span>
        </div>
    </div>
    <app-datatable [records]="configurationList" [defaultSortField]="defaultSortField"
        [defaultSortOrder]="defaultSortOrder" [cols]="cols" [fileName]="'Role'" [rows]="rows"
        [total]="configurationList ? configurationList.length : 0" [actions]="actions"
        (invokeAction)="actioInvoked($event)" [searchableColumns]="searchableColumns" [defaultstatus]="!currentStatus"
        (changeStatus)="changeStatus($event)" [hasActiveInactive]="true">
    </app-datatable>
</div>
