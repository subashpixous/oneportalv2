<div class="card">
    <div class="grid formgrid" style="justify-content: space-between;padding: 0rem 1rem;margin-bottom: 10px;">
        <div class="">
            <h4>{{title}}
            </h4>
        </div>
    </div>
    <div class="grid formgrid mb-3">
        <form [formGroup]="subsidyForm" (ngSubmit)="submit()" class="col-12">
            <div class="card p-fluid" style="padding-bottom: 10px;">
                <div class="p-formgrid grid">
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="scheme">Scheme</label>
                        <p-dropdown [options]="schemes" optionLabel="text" optionValue="value"
                            placeholder="Select a scheme" formControlName="scheme" [showClear]="
                            true"></p-dropdown>
                        <app-error-msg [control]="subsidyForm.get('scheme')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="religion">Religion</label>
                        <p-dropdown [options]="religions" optionLabel="text" optionValue="value"
                            placeholder="Select a religion" formControlName="religion" [showClear]="
                            true"></p-dropdown>
                        <app-error-msg [control]="subsidyForm.get('religion')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="community">Community</label>
                        <p-dropdown [options]="communities" optionLabel="text" optionValue="value"
                            placeholder="Select a community" formControlName="community" [showClear]="
                            true"></p-dropdown>
                        <app-error-msg [control]="subsidyForm.get('community')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="percentage">Subsidy percentage</label>
                        <input pInputText formControlName="percentage" type="text" />
                        <app-error-msg [control]="subsidyForm.get('percentage')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="cost">Subsidy Cost</label>
                        <input pInputText formControlName="cost" type="text" />
                        <app-error-msg [control]="subsidyForm.get('cost')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="from">From Date</label>
                        <p-calendar [defaultDate]="defaultDate" [showIcon]="true" [showButtonBar]="true"
                            dateFormat="dd-mm-yy" [maxDate]="subsidyForm.get('to')?.value" [readonlyInput]="true"
                            formControlName="from" inputId="icon"></p-calendar>
                        <app-error-msg [control]="subsidyForm.get('from')"></app-error-msg>
                    </div>
                    <div class="field col-12  md:col-3  lg:col-3">
                        <label htmlFor="to">To Date</label>
                        <p-calendar [defaultDate]="defaultDate" [showIcon]="true" [showButtonBar]="true"
                            dateFormat="dd-mm-yy" [minDate]="subsidyForm.get('from')?.value" [readonlyInput]="true"
                            formControlName="to" inputId="icon"></p-calendar>
                        <app-error-msg [control]="subsidyForm.get('to')"></app-error-msg>
                    </div>
                    <div class="col-12 md:col-3 flex  lg:col-3" style="margin-top: 25px">
                        <div class="col">
                            <button pButton type="submit" [disabled]="!subsidyForm.valid" label="Submit"></button>
                        </div>
                        <div class="col">
                            <button pButton type="button" class="p-button-secondary" label="Reset"
                                (click)="resetForm()"></button>
                        </div>

                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="grid formgrid">
        <div class="col-12 lg:col-9 md:col-9 flex ">
            <h4>{{this.title}} List </h4><span style="font-size: small;font-weight: 600;margin-left: 5px;"
                [ngStyle]="{'color': currentStatus ? '#0abb0a' : '#fd7878'}">
                {{currentStatus?'(Active)':'(In-Active)'}}</span>
        </div>
    </div>
    <app-datatable [records]="configurationList" [defaultSortField]="defaultSortField"
        [defaultSortOrder]="defaultSortOrder" [cols]="cols" [fileName]="'document'" [rows]="rows"
        [total]="configurationList ? configurationList.length : 0" [actions]="actions"
        (invokeAction)="actioInvoked($event)" [searchableColumns]="searchableColumns" [defaultstatus]="!currentStatus"
        (changeStatus)="changeStatus($event)" [hasActiveInactive]="true">
    </app-datatable>
</div>
