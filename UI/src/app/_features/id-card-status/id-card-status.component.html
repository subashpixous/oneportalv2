<div class="card noborderRad">
  <div class="grid formgrid">
    <div class="col-12 lg:col-9 md:col-9">
      <h4>{{ title }}</h4>
    </div>
  </div>

  <div class="mb-3">
    <div class="row flex">
      <!-- Left panel: Map & top count cards -->
      <div class="col-12 lg:col-7 md:col-6">
        <!-- My Work List & Top Cards -->
        <div class="workLiskContainer row flex col-12">
          <div class="col-12 flex justify-content-between">
            <h6>Card Status</h6>
          </div>

          <!-- Count Cards -->
          <div class="col-12 lg:col-3 md:col-3" *ngFor="let item of statusBars; let i = index">
            <div style="text-align: center; color:#0A417C; border-radius: 5px; cursor: pointer;">
              <p style="margin-bottom: 0px; padding-top: 5px; font-size: 14px;">{{ item.status }}</p>
              <p style="font-size: x-large; font-weight: 500;">{{ item.count }}</p>
            </div>
          </div>
        </div>

        <!-- Map -->
        <div class="workLiskContainer row flex col-12 mt-3">
          <app-map-view [markerPositions]="markerPositions"></app-map-view>
        </div>
      </div>

      <!-- Right panel: Status bars & dropdown -->
      <div class="col-12 lg:col-5 md:col-6">
        <!-- District Dropdown -->
        <div class="mb-3">
          <p-dropdown 
            [options]="districts" 
            optionLabel="label" 
            optionValue="value" 
            [(ngModel)]="selectedDistrictId"
            placeholder="Select a District"
            (onChange)="updateStatusBars(); updateMarkerPositions()"
             [style]="{'width': '100%','background': 'rgba(0, 0, 0, 0.02)'}" optionValue="value"
                           [showClear]="true">
          </p-dropdown>
        </div>

      

        <!-- Status Bars -->
        <!-- <div *ngFor="let item of statusBars; let i = index" class="mb-2">
          <div class="flex justify-content-between align-items-center">
            <span>{{ item.status }}</span>
            <span>{{ item.count }}</span>
          </div>
          <p-progressBar [value]="item.percentage" [showValue]="false" [style]="{'height':'.5rem'}"></p-progressBar>
        </div> -->
  <div *ngFor="let item of statusBars;let i = index">
                        <div class="col-12 flex justify-content-between pb-0">
                            <p style="display: flex;align-items: center;">{{item.status}}</p>
                            <p style="display: flex;align-items: center;font-size: 16px;">
                                {{item.count}}
                                <!-- <p-button icon="pi pi-arrow-right" [rounded]="true" [text]="true"
                                  severity="primary "></p-button> -->
                            </p>
                        </div>
                        <p-progressBar [value]="item.percentage" [showValue]="false"
                            [style]="{'height':'.5rem'}"></p-progressBar>
                    </div>

      </div>
    </div>
  </div>
</div>
