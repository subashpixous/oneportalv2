<div class="card noborderRad p-3">
  <!-- Header -->
  <div class="grid formgrid mb-3">
    <div class="col-12 lg:col-4 md:col-4 mb-2">
      <h4>{{ title }}</h4>
    </div>
  </div>

  <!-- District Filter -->
  <div class="grid formgrid mb-4">
    <div class="col-12 md:col-4 lg:col-3">
      <label class="mb-2 block font-medium text-gray-700">District</label>
       <p-multiSelect
          [options]="districts"
          optionLabel="text"
          
          optionValue="value"
          placeholder="Select a District"
          [showClear]="true"
          [(ngModel)]="selectedDistricts"
          (onChange)="onDistrictChange()"
            (onClear)="onClearDistricts()"
           
        ></p-multiSelect>
    </div>
  </div>

  <!-- Data Table -->
  <div class="card p-3">
    <app-datatable-pagination
      [records]="filteredRecords"
      [defaultSortField]="defaultSortField"
      [defaultSortOrder]="defaultSortOrder"
      [cols]="cols"
      [fileName]="'Card Disbursed'"
      [rows]="rows"
      [total]="total"
      [actions]="actions"
      (changefilter)="changefilter($event)"
      (onPageChangeEvent)="onPageChange($event)"
      (actionalAction)="actionalAction($event)"
      [searchableColumns]="searchableColumns"
      [hasActiveInactive]="false"
      [canShowAction]="false"
      [excelExport]="true" 
      (exportRequest)="onExportRequest($event)"
    ></app-datatable-pagination>
    <!-- modified by Sivasankar on 06-11-2025 for export functionality  -->
  </div>
</div>

<!-- Notifications -->
<p-toast></p-toast>
