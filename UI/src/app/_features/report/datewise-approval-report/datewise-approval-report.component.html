<div class="card noborderRad">
  <div class="grid formgrid">
    <div class="col-12 lg:col-4 md:col-4 mb-2">
      <h4>{{ title }}</h4>
    </div>

    <div class="col-12 lg:col-4 md:col-4 mb-2"></div>
    <div class="col-12 row lg:col-12 md:col-12 flex">
      <div class="col-12 lg:col-2 md:col-2">
        <p-dropdown
          [options]="datefilter"
          optionLabel="text"
          [style]="{ width: '100%' }"
          optionValue="value"
          placeholder="Select a Date Range"
          [showClear]="true"
          [(ngModel)]="selecteddatefilter"
          pTooltip="Year Range"
          tooltipPosition="top"
        ></p-dropdown>
      </div>
      <div class="col-12 lg:col-2 md:col-2">
        <p-calendar
          placeholder="Select Date Range"
          [(ngModel)]="selectedapprovaldatefilter"
          (onSelect)="onDateChange()"
          [style]="{ width: '100%' }"
          selectionMode="range"
          [maxDate]="maxDate"
          [showClear]="true"
          dateFormat="dd/mm/yy"
          pTooltip="Date Range"
          tooltipPosition="top"
        ></p-calendar>
      </div>
      <div class="col-12 lg:col-2 md:col-2 mb-2">
        <p-multiSelect
          [options]="applicationStatus"
          optionLabel="text"
          [style]="{ width: '100%' }"
          optionValue="value"
          placeholder="Application Status"
          [showClear]="true"
          [(ngModel)]="selectedStatuses"
          pTooltip="Application Status"
          tooltipPosition="top"
        ></p-multiSelect>
      </div>
        <div class="col-12 lg:col-2 md:col-2">
        <p-multiSelect
          [options]="divisions"
          optionLabel="text"
          [style]="{ width: '100%' }"
          optionValue="value"
          placeholder="Division"
          [showClear]="true"
          [(ngModel)]="selectedDivisions"
          (onChange)="onDivisionChange($event)"
          pTooltip="Division"
          tooltipPosition="top"
        ></p-multiSelect>
      </div>

      <div class="col-12 lg:col-2 md:col-2">
        <p-multiSelect
          [options]="districts"
          optionLabel="text"
          [style]="{ width: '100%' }"
          optionValue="value"
          placeholder="District"
          [showClear]="true"
          [(ngModel)]="selectedDistricts"
          pTooltip="District"
          tooltipPosition="top"
        ></p-multiSelect>
      </div>

      
      <ng-container *ngIf="showAllFilters">
        <div class="col-12 lg:col-2 md:col-2 mb-2">
          <p-multiSelect
            [options]="organizationType"
            optionLabel="text"
            [style]="{ width: '100%' }"
            optionValue="value"
            placeholder="Organization Type"
            [showClear]="true"
            [(ngModel)]="selectedorganizationType"
            pTooltip="Organization Type"
            tooltipPosition="top"
          ></p-multiSelect>
        </div>
        <div class="col-12 lg:col-2 md:col-2 mb-2">
          <p-multiSelect
            [options]="typeOfWork"
            optionLabel="text"
            optionValue="value"
            [(ngModel)]="selectedtypeOfWork"
            [style]="{ width: '100%' }"
            placeholder="Type Of Work"
            [showClear]="true"
            pTooltip="Type Of Work"
            tooltipPosition="top"
          >
          </p-multiSelect>
        </div>
        <div class="col-12 lg:col-2 md:col-2 mb-2">
          <p-multiSelect
            [options]="localBody"
            optionLabel="text"
            optionValue="text"
            [(ngModel)]="selectedlocalBody"
            [style]="{ width: '100%' }"
            placeholder="Local Body"
            [showClear]="true"
            pTooltip="Local Body"
            tooltipPosition="top"
          >
          </p-multiSelect>
        </div>

        <!-- 2️⃣ NAME OF LOCAL BODY -->
        <div class="col-12 lg:col-2 md:col-2 mb-2">
          <p-multiSelect
            [options]="nameOfLocalBody"
            optionLabel="text"
            optionValue="text"
            [(ngModel)]="selectednameOfLocalBody"
            [style]="{ width: '100%' }"
            placeholder="Name Of the LocalBody"
            [showClear]="true"
            pTooltip="Name Of the LocalBody"
            tooltipPosition="top"
          >
          </p-multiSelect>
        </div>

        <!-- REPORT FORMAT -->
<div class="col-12 lg:col-2 md:col-2">
  <p-dropdown
    [options]="reportFormats"
    optionLabel="text"
    optionValue="value"
    [(ngModel)]="selectedReportFormat"
    placeholder="Report Format"
    [showClear]="true"
    pTooltip="Report Format"
    tooltipPosition="top"
    [style]="{ width: '100%' }"
  ></p-dropdown>
</div>

        <!-- MEMBER AADHAAR NUMBER -->
<div class="col-12 lg:col-2 md:col-2">
  <input
    pInputText
    type="text"
    placeholder="Member Aadhaar Number"
    [(ngModel)]="memberAadhaarNumber"
    pTooltip="Member Aadhaar Number"
    tooltipPosition="top"
    maxlength="12"
    style="width: 100%"
  />
</div>

<!-- MEMBER PHONE NUMBER -->
<div class="col-12 lg:col-2 md:col-2">
  <input
    pInputText
    type="text"
    placeholder="Member Phone Number"
    [(ngModel)]="memberPhoneNumber"
    pTooltip="Member Phone Number"
    tooltipPosition="top"
    maxlength="10"
    style="width: 100%"
  />
</div>


        
      </ng-container>
      <div class="col-12 lg:col-2 md:col-2 mb-2 flex">
        <button
          pButton
          pRipple
          class="p-button-outlined p-button-sm flex-1"
          style="height: 100%; width: 40%"
          icon="pi pi-filter"
          [label]="showAllFilters ? 'Less Filters' : 'More Filters'"
          (click)="toggleFilters()"
        ></button>
      </div>
      <div class="col-12 lg:col-2 md:col-2">
        <button
          pButton
          pRipple
          class="p-button-secondary"
          icon="pi pi-arrow-right"
          (click)="generate()"
        ></button>
        <p-button
          icon="pi pi-times "
          [outlined]="true"
          (click)="reset()"
          [style]="{ 'margin-left': '10px' }"
        ></p-button>
      </div>
    </div>
  </div>
  <div class="mb-3 mt-3">
    <div class="row">

<!-- Updated by Sivasankar K on 20/12/2025 for DateWiseReport  -->

      <app-datatable-pagination
        [records]="configurationList"
        [defaultSortField]="defaultSortField"
        [defaultSortOrder]="defaultSortOrder"
        [cols]="cols"
        [fileName]="'DateWise'"
        [rows]="rows"
        [total]="total"
        [actions]="actions"
        (invokeAction)="actioInvoked($event)"
        [defaultstatus]="!currentStatus"
        (changeStatus)="changeStatus($event)"
        [searchableColumns]="searchableColumns"
        [hasActiveInactive]="false"
        [canShowAction]="false"
        (changefilter)="changefilter($event)"
        (actionalAction)="actionalAction($event)"
       [excelExport]="false"
       [normallyExportedData]="true"
  (exportRequest)="onExportRequest($event)"

      >
      </app-datatable-pagination>
    </div>
  </div>
  <!-- <div class="mb-3 mt-3" *ngIf="mainValue=='MEMBER'">
        <div class="row">
            <app-member-list></app-member-list>
        </div>
    </div> -->
</div>
<p-toast position="top-right"></p-toast>
