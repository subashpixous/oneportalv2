<div class="mb-5" *ngIf="chartoption">
    <div class="chartContainer">
        <h5></h5>
        <h5>Scheme Count Planned vs Actual</h5>
        <p-inputSwitch [(ngModel)]="chartoptionswitch" (ngModelChange)="chartoptionswitchchange($event)"
            [style]="{'display':'flex'}" />
    </div>
    <div class="card chartCard">
        <app-chart [chartopt]="chartoption"></app-chart>
    </div>
</div>
<div class="mb-5" *ngIf="achievementschartoption">
    <div class="chartContainer">
        <h5></h5>
        <h5>Scheme Acheivements Count</h5>
        <p-inputSwitch [(ngModel)]="achievementschartoptionswitch"
            (ngModelChange)="achievementschartoptionswitchChange($event)" [style]="{'display':'flex'}" />
    </div>
    <div class="card chartCard">
        <app-chart [chartopt]="achievementschartoption"></app-chart>
    </div>
</div>
