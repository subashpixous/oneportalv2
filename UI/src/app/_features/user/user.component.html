<div class="card noborderRad">
    <div class="grid formgrid">
        <div class="col-12 lg:col-9 md:col-9 ">
            <h4>{{title}}</h4>
        </div>
        <div class="col-12 lg:col-3 md:col-3 " style="text-align: end;">
            <button pButton pRipple label="Create" *ngxPermissionsOnly="[privleges.USER_CREATE, privleges.USER_UPDATE]"
                (click)="createmeeting('0')" icon="pi pi-plus" class="p-button-primary">
            </button>
        </div>
    </div>
    <div class="mb-3 mt-3">
        <div class="row">
            <app-datatable-pagination [records]="configurationList" [defaultSortField]="defaultSortField"
                [defaultSortOrder]="defaultSortOrder" [cols]="cols" [fileName]="'User'" [rows]="rows" [total]="total"
                [actions]="actions" (invokeAction)="actioInvoked($event)" [defaultstatus]="!currentStatus" [normallyExportedData]="true"
                (changeStatus)="changeStatus($event)" [searchableColumns]="searchableColumns" [hasActiveInactive]="true"
                (changefilter)="changefilter($event)">
            </app-datatable-pagination>

        </div>
    </div>
</div>
