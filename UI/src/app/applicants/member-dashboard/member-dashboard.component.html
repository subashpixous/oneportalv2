<div class="tn-secondary-nav">
    <div class="id-container">
        ID : {{ memberDetails?.memberId  }}
    </div>

    <div class="nav-actions">
        <div class="nav-item" (click)="memMenu.toggle($event)">
            <span>Member Info</span>
            <i class="pi pi-angle-down ml-2"></i>
        </div>
        <p-menu #memMenu [model]="memberInfoItems" [popup]="true"></p-menu>

        <div class="nav-item" (click)="goToDashboard()">
            <i class="pi pi-sitemap mr-2"></i>
            <span>Availed Scheme</span>
        </div>

        <div class="nav-item" (click)="eligMenu.toggle($event)">
            <i class="pi pi-list mr-2"></i>
            <span>Eligibility Scheme</span>
        </div>
        <p-menu #eligMenu [model]="eligibilitySchemeItems" [popup]="true" styleClass="wide-menu"></p-menu>
    </div>
</div>

<app-home></app-home>

<p-dialog header="உறுப்பினர் விவரங்கள் / Member Details" [modal]="true" [(visible)]="visible" [style]="{width: '50vw'}" [draggable]="false">
    <div class="mb-3 mt-4">
        <div class="row align-items-center mb-3" *ngFor="let item of modelforMemDetails">
            <div class="col-2 d-flex justify-content-center">
                <div class="circlew">
                    <img [src]="item.iconImageName" class="imgssize">
                </div>
            </div>
            <div class="col-7">
                <h6 class="fw-bold mb-0">{{item.buttonName}}</h6>
            </div>
            <div class="col-3">
                <p-button [disabled]="!item.canClick" 
                          [label]="item.buttonTextName" 
                          styleClass="p-button-rounded p-button-sm"
                          [style]="{'background': 'linear-gradient(103deg, #034772 22%, #2286E3 90%)'}"
                          (onClick)="movetosc(item.id)" />
            </div>
        </div>
    </div>
</p-dialog>
