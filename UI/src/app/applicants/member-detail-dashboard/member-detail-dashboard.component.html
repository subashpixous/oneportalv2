<div class="flex justify-content-between" style="background-color: #E5FFFE;padding: 8px;">
    <div class="flex align-items-center  mr-4">
        <p class="fw-bold"> உறுப்பினர் சேர்க்கை விவரங்கள் / MEMBER REGISTRATION DETAILS

        </p>
    </div>
    <div class="flex align-items-center  mr-4">
        <app-breadcrumb [breadcrumbs]="breadcrumbs"></app-breadcrumb>
        <p-button *ngIf="isLoggedin"
            [style]="{ 'border-radius':'18px; !important', 'padding':'5px 15px','margin-left':'10px','background': 'linear-gradient(103.06deg, #034772 22.83%, #2286E3 90.87%)'}"
            label="Logout" (onClick)="Logout()" />
    </div>
</div>
<div class="row " style="text-align: center; margin-top:10px ;background-color: white;">
    <div class="col-12 flex justify-content-center " style="padding-top: 10px;padding-bottom: 0px;flex-wrap: wrap;">
        <app-icon-button *ngFor="let item of model" [model]="item"
            (iconbtnClicked)="iconbtnClicked($event)"></app-icon-button>
    </div>
    <div class="col-12 imagediv justify-content-center">
        <p-button severity="secondary" styleClass="bcbtn" (onClick)="bckClick()" label="Back" />
    </div>
</div>
