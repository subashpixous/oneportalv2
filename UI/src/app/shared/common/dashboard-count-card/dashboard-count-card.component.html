<!-- ROW of parent cards -->
<div class="row">
    <div *ngFor="let item of items; let i = index" [ngClass]="[getColClass(items?.length??0)]"
        (click)="toggleExpand(i, item)">
        <div [ngClass]="[expandedIndex === i ? 'active-card' : 'inactive-card', 'cardlist']">
            <div class="row totcnt flex">
                <div class="col-3 totcntDivIcons" *ngIf="getColClass(items?.length??0)!='col-3'">
                    <i [class]="item.forwardIcon" style="color: white"></i>
                </div>
                <div class="text-align-center " style="text-align: center;"
                    [ngClass]="[getColClass(items?.length??0)=='col-3'?'col-12':'col-6']">
                    <div class="totcntDivSmall">{{ item.value }}</div>
                    <div class="totcntDiv">{{ item.count }}</div>
                </div>
                <div class="col-3 totcntDivIcons"
                    *ngIf="item && item.items && item.items.length >0  && getColClass(items?.length??0)!='col-3'">
                    <i [class]="expandedIndex === i ? 'pi pi-chevron-up' : item.backwardIcon" style="color: white"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CHILD ROW shown AFTER the parent row (new line) -->
<div *ngIf=" expandedItem && expandedItem?.expanded && expandedItem?.items">
    <app-dashboard-count-card [items]="expandedItem?.items"></app-dashboard-count-card>
</div>
