<div class="container container-md cntdtyle">
    <div class="text-align-center" style="text-align:center">
        <span class="p-error " *ngIf=" isError">{{ErrorMessage}}</span>
    </div>
    <label for="email1" style="font-size: 12px;margin-bottom: 5px;">மொபைல் எண் / Mobile Number</label>
    <input id="mobile" [maxlength]="10" type="text" (change)="clearErrormessage($event)" [(ngModel)]="mobile"
        placeholder="Mobile Number" [disabled]="showotp" pInputText class=" mb-3"
        [style]="{'padding':'5px','width':'100%'}">

        <div *ngIf="!hideOTP">
    <label for="password1" style="font-size: 12px;margin-bottom: 5px;" *ngIf="showotp">கடவுச்சொல் /
        OTP</label>

    <input id="otp" type="text" (change)="clearErrormessage($event)" *ngIf="showotp" [(ngModel)]="otp" placeholder="OTP"
        maxlength="6" pInputText class=" mb-3" [style]="{'padding':'5px','width':'100%'}">

    <div class="flex align-items-center flex-wrap ">
        <p *ngIf="showCounter" class="otpcls">{{ counter }} வினாடிகளில் OTP-ஐ மீண்டும் அனுப்பவும் / Resend
            OTP in {{ counter }} seconds</p>
        <a *ngIf="showResendOtp" class="otpcls font-medium underline ml-2 text-right cursor-pointer"
            style="color: var(--primary-color)" (click)="resendOTP()">OTP ஐ மீண்டும் அனுப்பவும் / Resend
            OTP</a>
    </div>
    </div>
    <div class="flex justify-content-center flex-wrap ">
        <p-button   type="button" severity="secondary" styleClass="bcbtn" (onClick)="cancel()" label="Cancel" />
        <p-button   type="button" severity="primary" styleClass="bcbtn" (onClick)="submit()" label="Submit" />
    </div>
</div>
